# MentalMapping Phase 1 — Google Sheets 接続設定
#
# credentials_path は Google Cloud Console で発行した
# サービスアカウント JSON のパスを指定する。
# spreadsheet_id はスプレッドシート URL の /d/<id>/ 部分。
# サービスアカウントのメールアドレスをスプレッドシートに「編集者」で共有しておくこと。

google_sheets:
  spreadsheet_id: "1S0cWK_0WIrxit8Yi0eK7Ocb-JHF99AsfxDCGPd0Hqao"
  sheet_name: "mood_log"
  credentials_path: "config/credentials.json"

# mood_log のカラム順（参考・実装で使用はしない）
# v2 仕様 (5段階 8項目): date + mood/energy/thinking/focus (1-5 必須) +
#   sleep_hours / weather / medication / period (任意) + recorded_at
mood_log_columns:
  - date
  - mood
  - energy
  - thinking
  - focus
  - sleep_hours
  - weather
  - medication
  - period
  - recorded_at
